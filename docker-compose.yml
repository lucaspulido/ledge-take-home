services:

  api:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: northwind-api

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    command: npm run dev

  postgres:

    image: postgres:17

    container_name: northwind-db

    restart: always

    ports:
      - "5432:5432"

    environment:

      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: northwind

    volumes:

      - postgres-data:/var/lib/postgresql/data

    healthcheck:

      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres"
        ]

      interval: 5s
      timeout: 5s
      retries: 10

volumes:

  postgres-data: